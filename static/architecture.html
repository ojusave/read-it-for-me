<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Read It For Me — How it works</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html,body{margin:0;padding:0;background:#ffffff;}
  .stage{width:1440px;}
  svg.diagram{display:block;width:1440px;height:auto}
</style>
</head>
<body>
<div class="stage">
  <svg class="diagram" viewBox="0 0 1440 560" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="#c4c4cc"/>
      </marker>

      <!-- real Render logomark (from static/images/icons/render.svg) -->
      <symbol id="logoRender" viewBox="0 0 24 24"><path fill="#6c63ff" d="m17.1491 1.50583c-2.6812-.1262-4.9358 1.81264-5.3205 4.36717-.0152.11854-.0381.23327-.0571.34799-.5979 3.18169-3.38195 5.59091-6.7258 5.59091-1.19206 0-2.31175-.3059-3.28672-.8413-.11807-.065-.25898.0191-.25898.1529v.6846 10.3137h10.2677v-7.7324c0-1.4226 1.1501-2.5775 2.5669-2.5775h2.5669c2.9059 0 5.2443-2.42069 5.13-5.36528-.1028-2.65013-2.2431-4.8146-4.8824-4.94079z"/></symbol>
      <!-- real Together AI logo (raster) -->
      <symbol id="logoTogether" viewBox="0 0 512 512"><image href="images/together-ai-logo.png" x="0" y="0" width="512" height="512"/></symbol>
      <!-- real PostgreSQL logomark (from static/images/icons/postgresql.svg) -->
      <symbol id="logoPg" viewBox="0 0 24 24"><path fill="#4169E1" d="M23.5594 14.7228a.5269.5269 0 0 0-.0563-.1191c-.139-.2632-.4768-.3418-1.0074-.2321-1.6533.3411-2.2935.1312-2.5256-.0191 1.342-2.0482 2.445-4.522 3.0411-6.8297.2714-1.0507.7982-3.5237.1222-4.7316a1.5641 1.5641 0 0 0-.1509-.235C21.6931.9086 19.8007.0248 17.5099.0005c-1.4947-.0158-2.7705.3461-3.1161.4794a9.449 9.449 0 0 0-.5159-.0816 8.044 8.044 0 0 0-1.3114-.1278c-1.1822-.0184-2.2038.2642-3.0498.8406-.8573-.3211-4.7888-1.645-7.2219.0788C.9359 2.1526.3086 3.8733.4302 6.3043c.0409.818.5069 3.334 1.2423 5.7436.4598 1.5065.9387 2.7019 1.4334 3.582.553.9942 1.1259 1.5933 1.7143 1.7895.4474.1491 1.1327.1441 1.8581-.7279.8012-.9635 1.5903-1.8258 1.9446-2.2069.4351.2355.9064.3625 1.39.3772a.0569.0569 0 0 0 .0004.0041 11.0312 11.0312 0 0 0-.2472.3054c-.3389.4302-.4094.5197-1.5002.7443-.3102.064-1.1344.2339-1.1464.8115-.0025.1224.0329.2309.0919.3268.2269.4231.9216.6097 1.015.6331 1.3345.3335 2.5044.092 3.3714-.6787-.017 2.231.0775 4.4174.3454 5.0874.2212.5529.7618 1.9045 2.4692 1.9043.2505 0 .5263-.0291.8296-.0941 1.7819-.3821 2.5557-1.1696 2.855-2.9059.1503-.8707.4016-2.8753.5388-4.1012.0169-.0703.0357-.1207.057-.1362.0007-.0005.0697-.0471.4272.0307a.3673.3673 0 0 0 .0443.0068l.2539.0223.0149.001c.8468.0384 1.9114-.1426 2.5312-.4308.6438-.2988 1.8057-1.0323 1.5951-1.6698zM12.092 14.7307c-.0525.141-.133.3566-.2567.6881-.0767.3149-.2004.6464-.3334 1.003-.6674-.0021-1.3168-.2872-1.8105-.8024-.6279-.6551-.9131-1.5664-.7825-2.5004.1828-1.3079.1153-2.4468.079-3.0586-.005-.0857-.0095-.1607-.0122-.2199.2957-.2621 1.6659-.9962 2.6429-.7724.4459.1022.7176.4057.8305.928.5846 2.7038.0774 3.8307-.3302 4.7363-.084.1866-.1633.3629-.2069.5983z"/></symbol>

      <style><![CDATA[
        text{font-family:Inter,"Helvetica Neue",Arial,sans-serif;}
        .h1{font-size:32px;font-weight:700;fill:#18181b}
        .h2{font-size:16px;font-weight:400;fill:#71717a}
        .kicker{font-size:13px;font-weight:700;letter-spacing:0.06em;fill:#a1a1aa}
        .title{font-size:20px;font-weight:700;fill:#18181b}
        .body{font-size:14.5px;font-weight:400;fill:#52525b}
        .foot{font-size:15px;font-weight:400;fill:#52525b}
      ]]></style>
    </defs>

    <rect x="0" y="0" width="1440" height="560" fill="#ffffff"/>

    <text x="40" y="54" class="h1">Read It For Me — How it works</text>
    <text x="40" y="86" class="h2">Turn a pile of links, notes, and PDFs into a short, action-oriented daily digest.</text>

    <!-- ===== STEP 1 — You ===== -->
    <g transform="translate(40,150)">
      <rect width="300" height="280" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.6"/>
      <circle cx="44" cy="48" r="20" fill="#eef2ff"/>
      <text x="44" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">1</text>
      <!-- person glyph -->
      <g transform="translate(232,24)">
        <circle cx="20" cy="16" r="11" fill="none" stroke="#2563eb" stroke-width="2.6"/>
        <path d="M2 48 Q2 28 20 28 Q38 28 38 48" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-linecap="round"/>
      </g>
      <text x="28" y="118" class="kicker">YOU</text>
      <text x="28" y="148" class="title">Add your reading</text>
      <text x="28" y="184" class="body">Paste links, drop in text,</text>
      <text x="28" y="206" class="body">or upload PDFs — plus an</text>
      <text x="28" y="228" class="body">optional topic to focus on.</text>
    </g>

    <path d="M348 290 L388 290" stroke="#c4c4cc" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>

    <!-- ===== STEP 2 — Render ===== -->
    <g transform="translate(396,150)">
      <rect width="300" height="280" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.6"/>
      <circle cx="44" cy="48" r="20" fill="#f0effe"/>
      <text x="44" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#6c63ff">2</text>
      <use href="#logoRender" x="240" y="28" width="34" height="34"/>
      <text x="28" y="118" class="kicker">RENDER</text>
      <text x="28" y="148" class="title">Reads each item</text>
      <text x="28" y="184" class="body">The app runs on Render and</text>
      <text x="28" y="206" class="body">opens every link, page, and</text>
      <text x="28" y="228" class="body">note, one item at a time.</text>
    </g>

    <path d="M704 290 L744 290" stroke="#c4c4cc" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>

    <!-- ===== STEP 3 — Together AI ===== -->
    <g transform="translate(752,150)">
      <rect width="300" height="280" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.6"/>
      <circle cx="44" cy="48" r="20" fill="#fff1ec"/>
      <text x="44" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#ff5b35"/>
      <text x="44" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#ff5b35">3</text>
      <use href="#logoTogether" x="244" y="26" width="36" height="36"/>
      <text x="28" y="118" class="kicker">TOGETHER AI</text>
      <text x="28" y="148" class="title">Analyzes &amp; rates it</text>
      <text x="28" y="184" class="body">AI explains what changed,</text>
      <text x="28" y="206" class="body">why it matters, and what to</text>
      <text x="28" y="228" class="body">do — then says read, skim,</text>
      <text x="28" y="250" class="body">or skip.</text>
    </g>

    <path d="M1060 290 L1100 290" stroke="#c4c4cc" stroke-width="2.4" fill="none" marker-end="url(#arrow)"/>

    <!-- ===== STEP 4 — Digest ===== -->
    <g transform="translate(1108,150)">
      <rect width="300" height="280" rx="18" fill="#ffffff" stroke="#e6e6ea" stroke-width="1.6"/>
      <circle cx="44" cy="48" r="20" fill="#eef2ff"/>
      <text x="44" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#2563eb">4</text>
      <!-- checklist glyph -->
      <g transform="translate(244,26)">
        <rect x="0" y="0" width="34" height="34" rx="7" fill="none" stroke="#2563eb" stroke-width="2.4"/>
        <path d="M8 12 L11 15 L16 9" fill="none" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="20" y1="12" x2="27" y2="12" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
        <path d="M8 24 L11 27 L16 21" fill="none" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="20" y1="24" x2="27" y2="24" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
      </g>
      <text x="28" y="118" class="kicker">YOUR DIGEST</text>
      <text x="28" y="148" class="title">Read live</text>
      <text x="28" y="184" class="body">Cards appear as they finish,</text>
      <text x="28" y="206" class="body">with a headline and clear</text>
      <text x="28" y="228" class="body">do-today / read-now / skip</text>
      <text x="28" y="250" class="body">lists.</text>
    </g>

    <!-- ===== footer note: memory ===== -->
    <g transform="translate(40,478)">
      <rect width="1368" height="56" rx="14" fill="#f7f9ff" stroke="#e2e8ff" stroke-width="1.4"/>
      <use href="#logoPg" x="24" y="16" width="24" height="24"/>
      <text x="64" y="34" class="foot"><tspan style="font-weight:600;fill:#27272a">Remembers what you've read.</tspan>  Past articles are saved, so the next time a source updates, the digest points out exactly what's new.</text>
    </g>
  </svg>
</div>
</body>
</html>
