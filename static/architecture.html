      <style><![CDATA[
        text{font-family:Inter,"Helvetica Neue",Arial,sans-serif;}
        .h1{font-size:30px;font-weight:700;fill:#f4f4f8}
        .h2{font-size:15px;font-weight:400;fill:#9b9bab}
        .zone{font-size:13px;font-weight:700;letter-spacing:0.22em;fill:#7d8294}
        .panelTitle{font-size:21px;font-weight:600;fill:#f4f4f8}
        .panelSub{font-size:12.5px;font-weight:400;fill:#9b9bab}

    <rect x="0" y="0" width="1600" height="940" fill="#0b0d14"/>

    <!-- title -->
    <text x="44" y="50" class="h1">Read It For Me — Architecture</text>
    <text x="44" y="78" class="h2">The browser streams a digest request; Render Workflows fetch, analyze, and synthesize; Together AI does the inference</text>

    <!-- zone labels -->
    <text x="220" y="118" text-anchor="middle" class="zone">CLIENT</text>
    <text x="810" y="118" text-anchor="middle" class="zone">RENDER</text>
    <text x="1390" y="118" text-anchor="middle" class="zone">INFERENCE</text>

    <!-- zone containers -->
    <rect x="44"   y="134" width="352" height="772" rx="18" fill="#0e1119" stroke="#252a39" stroke-width="1.4"/>
    <rect x="440"  y="134" width="740" height="772" rx="18" fill="#0e1119" stroke="#2c2747" stroke-width="1.4"/>
    <rect x="1224" y="134" width="332" height="772" rx="18" fill="#0e1119" stroke="#3a2a23" stroke-width="1.4"/>

    <!-- ============ CLIENT (left) ============ -->
    <g transform="translate(44,134)">
      <!-- browser header -->
      <use href="#logoUser" x="26" y="28" width="44" height="60"/>
      <text x="92" y="56" class="panelTitle">Browser</text>
      <text x="92" y="78" class="panelSub">Svelte 5 single-page app</text>
      <use href="#logoSvelte" x="300" y="34" width="26" height="26"/>

      <!-- card: digest form -->
      <g transform="translate(26,118)">
        <rect width="300" height="176" rx="12" fill="#141826" stroke="#2b3142"/>
        <rect x="0" y="0" width="5" height="176" rx="2.5" fill="#45b6f5"/>
        <text x="22" y="34" class="cardTitle">Digest form</text>
        <text x="22" y="60" class="cardDesc">URLs — one per line (max 20)</text>
        <text x="22" y="82" class="cardDesc">Pasted text blocks</text>
        <text x="22" y="104" class="cardDesc">PDF uploads (max 5 · 3 MB)</text>
        <text x="22" y="126" class="cardDesc">Optional focus theme</text>
        <text x="22" y="156" class="mono" style="font-size:12px">App.svelte · lib/api.ts</text>
      </g>

      <!-- card: live feed -->
      <g transform="translate(26,318)">
        <rect width="300" height="176" rx="12" fill="#141826" stroke="#2b3142"/>
        <rect x="0" y="0" width="5" height="176" rx="2.5" fill="#8b80ff"/>
        <text x="22" y="34" class="cardTitle">Live results</text>
        <text x="22" y="60" class="cardDesc">EventSource consumes the SSE</text>
        <text x="22" y="78" class="cardDesc">stream as tasks run on Render.</text>
        <text x="22" y="104" class="cardDesc">Activity feed · per-item cards</text>
        <text x="22" y="122" class="cardDesc">read / skim / skip verdicts</text>
        <text x="22" y="156" class="mono" style="font-size:12px">ActivityPanel · DigestCard</text>
      </g>

      <!-- card: verdict legend -->
      <g transform="translate(26,518)">
        <rect width="300" height="100" rx="12" fill="#10131e" stroke="#222838"/>
        <text x="22" y="32" class="cardDesc">Every card answers four questions:</text>
        <text x="22" y="56" class="mono" style="font-size:12px;fill:#9b9bab">whatChanged · whyCare</text>
        <text x="22" y="76" class="mono" style="font-size:12px;fill:#9b9bab">whatToDo · worthReading</text>
      </g>
    </g>

    <!-- ============ RENDER (center) ============ -->
    <g transform="translate(440,134)">
      <use href="#logoRender" x="28" y="32" width="26" height="26"/>
      <text x="66" y="54" class="panelTitle">Render</text>
      <text x="66" y="76" class="panelSub">Web Service + Workflows + Postgres</text>

      <!-- Web Service card -->
      <g transform="translate(26,98)">
        <rect width="688" height="150" rx="12" fill="#15172a" stroke="#3a3566"/>
        <rect x="0" y="0" width="5" height="150" rx="2.5" fill="#8b80ff"/>
        <use href="#logoExpress" x="24" y="24" width="24" height="24"/>
        <text x="62" y="42" class="cardTitle">Web Service — Express</text>
        <text x="540" y="40" class="note" fill="#8b80ff">STARTER PLAN</text>

        <g transform="translate(24,66)">
          <rect width="206" height="64" rx="9" fill="#0f1120" stroke="#2b2c47"/>
          <text x="16" y="26" class="cardDesc" style="fill:#dfe0ea;font-weight:600">REST + multipart API</text>
          <text x="16" y="48" class="mono" style="font-size:11px">POST /api/digest · /health</text>
        </g>
        <g transform="translate(242,66)">
          <rect width="206" height="64" rx="9" fill="#0f1120" stroke="#2b2c47"/>
          <text x="16" y="26" class="cardDesc" style="fill:#dfe0ea;font-weight:600">SSE Orchestrator</text>
          <text x="16" y="48" class="mono" style="font-size:11px">startTask · poll · stream</text>
        </g>
        <g transform="translate(460,66)">
          <rect width="206" height="64" rx="9" fill="#0f1120" stroke="#2b2c47"/>
          <text x="16" y="26" class="cardDesc" style="fill:#dfe0ea;font-weight:600">Static SPA host</text>
          <text x="16" y="48" class="mono" style="font-size:11px">serves dist/client</text>
        </g>
      </g>

      <!-- dispatch arrow web service -> workflows -->
      <path d="M370 252 L370 286" stroke="#8b80ff" stroke-width="1.8" fill="none" marker-end="url(#aRender)" class="flow"/>
      <text x="382" y="274" class="edge" fill="#a99fff">startTask · getTaskRun poll</text>

      <!-- Render Workflows card -->
      <g transform="translate(26,294)">
        <rect width="688" height="372" rx="12" fill="#13122a" stroke="#3a3566"/>
        <use href="#logoRender" x="24" y="22" width="22" height="22"/>
        <text x="58" y="40" class="cardTitle">Render Workflows</text>
        <text x="220" y="40" class="panelSub">each task = isolated instance · own retries &amp; timeout · dashboard replay</text>

        <!-- step 1 fetch_item -->
        <g transform="translate(24,64)">
          <rect width="640" height="86" rx="10" fill="#191a30" stroke="#34305c"/>
          <circle cx="34" cy="30" r="15" fill="#8b80ff"/>
          <text x="34" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0d14">1</text>
          <text x="62" y="30" class="step">fetch_item</text>
          <text x="62" y="54" class="cardDesc">Fetch URL &amp; strip HTML · decode pasted text · PDF placeholder. Excerpts the body.</text>
          <text x="62" y="74" class="note" fill="#7d8294">STARTER · TIMEOUT 120s · 2 RETRIES · 2× BACKOFF</text>
        </g>

        <!-- step 2 analyze_item -->
        <g transform="translate(24,160)">
          <rect width="640" height="92" rx="10" fill="#191a30" stroke="#34305c"/>
          <circle cx="34" cy="30" r="15" fill="#8b80ff"/>
          <text x="34" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0d14">2</text>
          <text x="62" y="30" class="step">analyze_item</text>
          <text x="62" y="54" class="cardDesc">Together AI answers the 4 digest questions + read/skim/skip. Diffs against the</text>
          <text x="62" y="72" class="cardDesc">prior Postgres snapshot to report what changed.</text>
          <text x="430" y="30" class="note" fill="#ff8a5c">→ TOGETHER AI</text>
          <text x="62" y="-2" class="note" fill="#7d8294"></text>
        </g>

        <!-- step 3 synthesize_digest -->
        <g transform="translate(24,262)">
          <rect width="640" height="86" rx="10" fill="#191a30" stroke="#34305c"/>
          <circle cx="34" cy="30" r="15" fill="#8b80ff"/>
          <text x="34" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0d14">3</text>
          <text x="62" y="30" class="step">synthesize_digest</text>
          <text x="62" y="54" class="cardDesc">Merges every analysis into one summary: headline + doToday / readNow / skip.</text>
          <text x="62" y="74" class="note" fill="#7d8294">STARTER · TIMEOUT 120s · 2 RETRIES   ·   → TOGETHER AI</text>
        </g>

        <!-- vertical chain arrows -->
        <g stroke="#8b80ff" stroke-width="1.8" fill="none" marker-end="url(#aRender)" class="flow">
          <path d="M344 150 L344 160"/>
          <path d="M344 252 L344 262"/>
        </g>
      </g>

      <!-- Postgres cylinder -->
      <g transform="translate(196,694)">
        <path d="M0 12 L0 60 A 150 11 0 0 0 300 60 L300 12" fill="#101a2b" stroke="#3766a8" stroke-width="1.5"/>
        <ellipse cx="150" cy="12" rx="150" ry="11" fill="#13233a" stroke="#3766a8" stroke-width="1.5"/>
        <use href="#logoPg" x="78" y="24" width="22" height="22"/>
        <text x="110" y="42" class="cardTitle" style="font-size:16px">Render Postgres</text>
        <text x="150" y="64" text-anchor="middle" class="cardDesc">digest_runs · source_snapshots · digest_items</text>
      </g>

      <!-- workflows <-> postgres edge -->
      <path d="M250 666 L300 694" stroke="#6ea8ff" stroke-width="1.5" fill="none" stroke-dasharray="5 4" marker-end="url(#aPg)"/>
      <path d="M470 694 L470 666" stroke="#6ea8ff" stroke-width="1.5" fill="none" stroke-dasharray="5 4" marker-end="url(#aPg)"/>
      <text x="360" y="688" text-anchor="middle" class="edge" fill="#8fbcff">snapshot read / write</text>
    </g>

    <!-- ============ INFERENCE (right) ============ -->
    <g transform="translate(1224,134)">
      <use href="#logoTogether" x="26" y="30" width="30" height="30"/>
      <text x="68" y="54" class="panelTitle">Together AI</text>
      <text x="68" y="76" class="panelSub">Called only inside Workflow tasks</text>

      <!-- model card -->
      <g transform="translate(26,108)">
        <rect width="280" height="158" rx="12" fill="#1b1410" stroke="#5a3a2a"/>
        <rect x="0" y="0" width="5" height="158" rx="2.5" fill="#ff5b35"/>
        <use href="#logoTogether" x="20" y="22" width="40" height="40"/>
        <text x="76" y="42" class="cardTitle">Llama 3.3 70B</text>
        <text x="76" y="62" class="cardDesc">Instruct Turbo</text>
        <text x="22" y="98" class="cardDesc">JSON-mode chat completions,</text>
        <text x="22" y="116" class="cardDesc">temp 0.2 · schema-validated.</text>
        <text x="22" y="142" class="mono" style="font-size:12px">workflow/lib/together.ts</text>
      </g>

      <!-- usage card -->
      <g transform="translate(26,288)">
        <rect width="280" height="132" rx="12" fill="#141826" stroke="#2b3142"/>
        <text x="22" y="30" class="cardTitle" style="font-size:14px">Two callers</text>
        <text x="22" y="56" class="mono" style="font-size:12px;fill:#cfd0db">analyze_item</text>
        <text x="258" y="56" text-anchor="end" class="cardDesc">4 Qs + verdict</text>
        <text x="22" y="80" class="mono" style="font-size:12px;fill:#cfd0db">synthesize_digest</text>
        <text x="258" y="80" text-anchor="end" class="cardDesc">final summary</text>
        <text x="22" y="110" class="cardDesc">Retries on premature-close / reset</text>
      </g>

      <!-- key isolation note -->
      <g transform="translate(26,430)">
        <rect width="280" height="172" rx="12" fill="#10131e" stroke="#222838" stroke-dasharray="4 4"/>
        <rect x="18" y="18" width="76" height="22" rx="5" fill="#15172a" stroke="#5a3a2a"/>
        <text x="56" y="33" text-anchor="middle" class="note" fill="#ff8a5c">KEY SAFETY</text>
        <text x="20" y="66" class="cardDesc">TOGETHER_API_KEY lives only on</text>
        <text x="20" y="84" class="cardDesc">the Workflow service. The web</text>
        <text x="20" y="102" class="cardDesc">service never holds it — it only</text>
        <text x="20" y="120" class="cardDesc">dispatches tasks and streams.</text>
        <text x="20" y="150" class="cardDesc" style="fill:#7d8294">Each task pays its own retry budget.</text>
      </g>
    </g>
