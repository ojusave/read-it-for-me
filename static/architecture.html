<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Read It For Me — Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
  html,body{margin:0;padding:0;background:#ffffff;}
  .stage{width:1500px;}
  svg.diagram{display:block;width:1500px;height:auto}
</style>
</head>
<body>
<div class="stage">
  <svg class="diagram" viewBox="0 0 1500 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="aInk"  viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#3f3f46"/></marker>
      <marker id="aRen"  viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6c63ff"/></marker>
      <marker id="aOrg"  viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ff5b35"/></marker>
      <marker id="aPg"   viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#4169E1"/></marker>

      <symbol id="logoRender" viewBox="0 0 24 24"><path fill="#6c63ff" d="m17.1491 1.50583c-2.6812-.1262-4.9358 1.81264-5.3205 4.36717-.0152.11854-.0381.23327-.0571.34799-.5979 3.18169-3.38195 5.59091-6.7258 5.59091-1.19206 0-2.31175-.3059-3.28672-.8413-.11807-.065-.25898.0191-.25898.1529v.6846 10.3137h10.2677v-7.7324c0-1.4226 1.1501-2.5775 2.5669-2.5775h2.5669c2.9059 0 5.2443-2.42069 5.13-5.36528-.1028-2.65013-2.2431-4.8146-4.8824-4.94079z"/></symbol>
      <symbol id="logoSvelte" viewBox="0 0 24 24"><path fill="#ff3e00" d="M10.354 21.125a4.44 4.44 0 0 1-4.765-1.767 4.109 4.109 0 0 1-.703-3.107 3.898 3.898 0 0 1 .134-.522l.105-.321.287.21a7.21 7.21 0 0 0 2.186 1.092l.208.063-.02.208a1.253 1.253 0 0 0 .226.83 1.337 1.337 0 0 0 1.435.533 1.231 1.231 0 0 0 .343-.15l5.59-3.562a1.164 1.164 0 0 0 .524-.778 1.242 1.242 0 0 0-.211-.937 1.338 1.338 0 0 0-1.435-.533 1.23 1.23 0 0 0-.343.15l-2.133 1.36a4.078 4.078 0 0 1-1.135.499 4.44 4.44 0 0 1-4.765-1.766 4.108 4.108 0 0 1-.702-3.108 3.855 3.855 0 0 1 1.742-2.582l5.589-3.563a4.072 4.072 0 0 1 1.135-.499 4.44 4.44 0 0 1 4.765 1.767 4.109 4.109 0 0 1 .703 3.107 3.943 3.943 0 0 1-.134.522l-.105.321-.286-.21a7.204 7.204 0 0 0-2.187-1.093l-.208-.063.02-.207a1.255 1.255 0 0 0-.226-.831 1.337 1.337 0 0 0-1.435-.532 1.231 1.231 0 0 0-.343.15L8.62 9.368a1.162 1.162 0 0 0-.524.778 1.24 1.24 0 0 0 .211.937 1.338 1.338 0 0 0 1.435.533 1.235 1.235 0 0 0 .344-.151l2.132-1.36a4.067 4.067 0 0 1 1.135-.498 4.44 4.44 0 0 1 4.765 1.766 4.108 4.108 0 0 1 .702 3.108 3.857 3.857 0 0 1-1.742 2.583l-5.589 3.562a4.072 4.072 0 0 1-1.135.499m10.358-17.95C18.484-.015 14.082-.96 10.9 1.068L5.31 4.63a6.412 6.412 0 0 0-2.896 4.295 6.753 6.753 0 0 0 .666 4.336 6.43 6.43 0 0 0-.96 2.396 6.833 6.833 0 0 0 1.168 5.167c2.229 3.19 6.63 4.135 9.812 2.108l5.59-3.562a6.41 6.41 0 0 0 2.896-4.295 6.756 6.756 0 0 0-.665-4.336 6.429 6.429 0 0 0 .958-2.396 6.831 6.831 0 0 0-1.167-5.168Z"/></symbol>
      <symbol id="logoExpress" viewBox="0 0 24 24"><path fill="#18181b" d="M24 18.588a1.529 1.529 0 01-1.895-.72l-3.45-4.771-.5-.667-4.003 5.444a1.466 1.466 0 01-1.802.708l5.158-6.92-4.798-6.251a1.595 1.595 0 011.9.666l3.576 4.83 3.596-4.81a1.435 1.435 0 011.788-.668L21.708 7.9l-2.522 3.283a.666.666 0 000 .994l4.804 6.412zM.002 11.576l.42-2.075c1.154-4.103 5.858-5.81 9.094-3.27 1.895 1.489 2.368 3.597 2.275 5.973H1.116C.943 16.447 4.005 19.009 7.92 17.7a4.078 4.078 0 002.582-2.876c.207-.666.548-.78 1.174-.588a5.417 5.417 0 01-2.589 3.957 6.272 6.272 0 01-7.306-.933 6.575 6.575 0 01-1.64-3.858c0-.235-.08-.455-.134-.666A88.33 88.33 0 010 11.577zm1.127-.286h9.654c-.06-3.076-2.001-5.258-4.59-5.278-2.882-.04-4.944 2.094-5.071 5.264z"/></symbol>
      <symbol id="logoTogether" viewBox="0 0 64 64">
        <circle cx="19" cy="21" r="12.5" fill="#c9b6f2"/>
        <circle cx="45" cy="21" r="12.5" fill="#ec4fc4"/>
        <circle cx="32" cy="44" r="12.5" fill="#ff4d00"/>
        <line x1="19" y1="21" x2="25" y2="32" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="45" y1="21" x2="34" y2="21" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="32" y1="44" x2="39" y2="33" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/>
      </symbol>
      <symbol id="logoUser" viewBox="0 0 80 110">
        <circle cx="40" cy="22" r="15" fill="none" stroke="#2563eb" stroke-width="3.4"/>
        <path d="M9 100 Q9 48 40 48 Q71 48 71 100" fill="none" stroke="#2563eb" stroke-width="3.4" stroke-linecap="round"/>
      </symbol>

      <style><![CDATA[
        text{font-family:Inter,"Helvetica Neue",Arial,sans-serif;}
        .h1{font-size:30px;font-weight:700;fill:#18181b}
        .h2{font-size:15px;font-weight:400;fill:#71717a}
        .zone{font-size:12.5px;font-weight:700;letter-spacing:0.2em;fill:#a1a1aa}
        .panelTitle{font-size:20px;font-weight:700;fill:#18181b}
        .panelSub{font-size:12.5px;font-weight:400;fill:#71717a}
        .cardTitle{font-size:15px;font-weight:600;fill:#18181b}
        .cardDesc{font-size:13px;font-weight:400;fill:#52525b}
        .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-weight:500;fill:#6c63ff}
        .step{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:16px;font-weight:600;fill:#18181b}
        .note{font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;fill:#a1a1aa}
        .edge{font-size:12.5px;font-weight:500;fill:#71717a}
        .edgeStrong{font-size:12.5px;font-weight:600;fill:#27272a}
        @keyframes flow { to { stroke-dashoffset:-20; } }
        .flow{stroke-dasharray:6 6;animation:flow 1.4s linear infinite;}
      ]]></style>
    </defs>

    <rect x="0" y="0" width="1500" height="820" fill="#ffffff"/>

    <text x="44" y="48" class="h1">Read It For Me — Architecture</text>
    <text x="44" y="76" class="h2">The browser streams a digest request; Render Workflows fetch, analyze, and synthesize; Together AI does the inference.</text>

    <!-- zone labels -->
    <text x="206" y="116" text-anchor="middle" class="zone">CLIENT</text>
    <text x="760" y="116" text-anchor="middle" class="zone">RENDER</text>
    <text x="1300" y="116" text-anchor="middle" class="zone">INFERENCE</text>

    <!-- zone containers -->
    <rect x="44"   y="132" width="324" height="652" rx="16" fill="#fafafa" stroke="#ececef" stroke-width="1.4"/>
    <rect x="408"  y="132" width="704" height="652" rx="16" fill="#f7f6ff" stroke="#e7e4fb" stroke-width="1.4"/>
    <rect x="1152" y="132" width="304" height="652" rx="16" fill="#fff7f4" stroke="#fbe2d8" stroke-width="1.4"/>

    <!-- ============ CLIENT ============ -->
    <g transform="translate(44,132)">
      <use href="#logoUser" x="28" y="34" width="40" height="56"/>
      <text x="92" y="62" class="panelTitle">Browser</text>
      <text x="92" y="84" class="panelSub">Svelte 5 single-page app</text>
      <use href="#logoSvelte" x="276" y="40" width="26" height="26"/>

      <g transform="translate(28,122)">
        <rect width="268" height="184" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
        <rect x="0" y="0" width="5" height="184" rx="2.5" fill="#2563eb"/>
        <text x="22" y="36" class="cardTitle">Build a digest</text>
        <text x="22" y="66" class="cardDesc">URLs — one per line (≤20)</text>
        <text x="22" y="92" class="cardDesc">Pasted text blocks</text>
        <text x="22" y="118" class="cardDesc">PDF uploads (≤5 · 3 MB)</text>
        <text x="22" y="144" class="cardDesc">Optional focus theme</text>
        <text x="22" y="170" class="mono" style="font-size:12px">App.svelte · lib/api.ts</text>
      </g>

      <g transform="translate(28,330)">
        <rect width="268" height="178" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
        <rect x="0" y="0" width="5" height="178" rx="2.5" fill="#6c63ff"/>
        <text x="22" y="36" class="cardTitle">Live results</text>
        <text x="22" y="64" class="cardDesc">EventSource reads the SSE</text>
        <text x="22" y="84" class="cardDesc">stream as tasks run.</text>
        <text x="22" y="116" class="cardDesc">Activity feed + per-item</text>
        <text x="22" y="136" class="cardDesc">cards · read / skim / skip</text>
        <text x="22" y="166" class="mono" style="font-size:12px">ActivityPanel · DigestCard</text>
      </g>
    </g>

    <!-- ============ RENDER ============ -->
    <g transform="translate(408,132)">
      <use href="#logoRender" x="28" y="40" width="26" height="26"/>
      <text x="66" y="62" class="panelTitle">Render</text>
      <text x="66" y="84" class="panelSub">Web Service · Workflows · Postgres</text>

      <!-- Web Service -->
      <g transform="translate(28,108)">
        <rect width="648" height="118" rx="12" fill="#ffffff" stroke="#cdc7f7"/>
        <rect x="0" y="0" width="5" height="118" rx="2.5" fill="#6c63ff"/>
        <use href="#logoExpress" x="22" y="22" width="24" height="24"/>
        <text x="58" y="40" class="cardTitle">Web Service — Express</text>
        <text x="520" y="38" class="note">STARTER</text>
        <g transform="translate(22,58)">
          <rect width="194" height="44" rx="8" fill="#fafafa" stroke="#ececef"/>
          <text x="14" y="20" class="cardDesc" style="font-weight:600;fill:#27272a">REST + multipart API</text>
          <text x="14" y="37" class="mono" style="font-size:10.5px">POST /api/digest · /health</text>
        </g>
        <g transform="translate(228,58)">
          <rect width="194" height="44" rx="8" fill="#fafafa" stroke="#ececef"/>
          <text x="14" y="20" class="cardDesc" style="font-weight:600;fill:#27272a">SSE Orchestrator</text>
          <text x="14" y="37" class="mono" style="font-size:10.5px">startTask · poll · stream</text>
        </g>
        <g transform="translate(434,58)">
          <rect width="192" height="44" rx="8" fill="#fafafa" stroke="#ececef"/>
          <text x="14" y="20" class="cardDesc" style="font-weight:600;fill:#27272a">Static SPA host</text>
          <text x="14" y="37" class="mono" style="font-size:10.5px">serves dist/client</text>
        </g>
      </g>

      <!-- dispatch arrow -->
      <path d="M352 226 L352 256" stroke="#6c63ff" stroke-width="1.9" fill="none" marker-end="url(#aRen)" class="flow"/>
      <text x="364" y="246" class="edge" fill="#6c63ff">startTask · poll getTaskRun</text>

      <!-- Render Workflows -->
      <g transform="translate(28,264)">
        <rect width="648" height="312" rx="12" fill="#ffffff" stroke="#cdc7f7"/>
        <use href="#logoRender" x="22" y="20" width="22" height="22"/>
        <text x="54" y="38" class="cardTitle">Render Workflows</text>
        <text x="214" y="38" class="panelSub">each task isolated · own timeout &amp; retries · replay</text>

        <g transform="translate(22,58)">
          <rect width="604" height="72" rx="10" fill="#fafafa" stroke="#e7e4fb"/>
          <circle cx="34" cy="28" r="15" fill="#6c63ff"/>
          <text x="34" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1</text>
          <text x="60" y="28" class="step">fetch_item</text>
          <text x="60" y="52" class="cardDesc">Fetch URL &amp; strip HTML · decode pasted text · PDF placeholder. Excerpts the body.</text>
        </g>
        <g transform="translate(22,140)">
          <rect width="604" height="72" rx="10" fill="#fafafa" stroke="#e7e4fb"/>
          <circle cx="34" cy="28" r="15" fill="#6c63ff"/>
          <text x="34" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2</text>
          <text x="60" y="28" class="step">analyze_item</text>
          <text x="60" y="52" class="cardDesc">4 digest questions + read / skim / skip. Diffs the prior Postgres snapshot.</text>
          <use href="#logoTogether" x="556" y="20" width="30" height="30"/>
        </g>
        <g transform="translate(22,222)">
          <rect width="604" height="72" rx="10" fill="#fafafa" stroke="#e7e4fb"/>
          <circle cx="34" cy="28" r="15" fill="#6c63ff"/>
          <text x="34" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3</text>
          <text x="60" y="28" class="step">synthesize_digest</text>
          <text x="60" y="52" class="cardDesc">Merges analyses into one summary: headline + doToday / readNow / skip.</text>
          <use href="#logoTogether" x="556" y="20" width="30" height="30"/>
        </g>

        <g stroke="#6c63ff" stroke-width="1.9" fill="none" marker-end="url(#aRen)" class="flow">
          <path d="M40 130 L40 140"/>
          <path d="M40 212 L40 222"/>
        </g>
      </g>
    </g>

    <!-- ============ INFERENCE ============ -->
    <g transform="translate(1152,132)">
      <use href="#logoTogether" x="28" y="38" width="30" height="30"/>
      <text x="70" y="62" class="panelTitle">Together AI</text>
      <text x="70" y="84" class="panelSub">Called only by Workflow tasks</text>

      <g transform="translate(28,122)">
        <rect width="248" height="170" rx="12" fill="#ffffff" stroke="#fbe2d8"/>
        <rect x="0" y="0" width="5" height="170" rx="2.5" fill="#ff5b35"/>
        <use href="#logoTogether" x="22" y="24" width="44" height="44"/>
        <text x="80" y="46" class="cardTitle">Llama 3.3 70B</text>
        <text x="80" y="66" class="cardDesc">Instruct Turbo</text>
        <text x="22" y="104" class="cardDesc">JSON-mode chat completions,</text>
        <text x="22" y="124" class="cardDesc">temp 0.2 · schema-validated.</text>
        <text x="22" y="152" class="mono" style="font-size:11.5px;fill:#52525b">workflow/lib/together.ts</text>
      </g>

      <g transform="translate(28,316)">
        <rect width="248" height="192" rx="12" fill="#fafafa" stroke="#ececef" stroke-dasharray="4 4"/>
        <rect x="18" y="18" width="92" height="24" rx="6" fill="#fff" stroke="#fbe2d8"/>
        <text x="64" y="34" text-anchor="middle" class="note" fill="#ff5b35">KEY SAFETY</text>
        <text x="20" y="70" class="cardDesc">TOGETHER_API_KEY lives only</text>
        <text x="20" y="90" class="cardDesc">on the Workflow service.</text>
        <text x="20" y="118" class="cardDesc">The web service just</text>
        <text x="20" y="138" class="cardDesc">dispatches tasks and streams</text>
        <text x="20" y="158" class="cardDesc">results — it holds no model key.</text>
      </g>
    </g>

    <!-- ===== cross-zone edges ===== -->
    <path d="M368 348 L406 348" stroke="#3f3f46" stroke-width="1.9" fill="none" marker-end="url(#aInk)"/>
    <text x="387" y="336" text-anchor="middle" class="edgeStrong">request</text>
    <path d="M406 398 L368 398" stroke="#6c63ff" stroke-width="1.9" fill="none" marker-end="url(#aRen)" class="flow"/>
    <text x="387" y="418" text-anchor="middle" class="edge" fill="#6c63ff">SSE stream</text>

    <path d="M1112 446 L1150 446" stroke="#ff5b35" stroke-width="1.9" fill="none" stroke-dasharray="6 5" marker-end="url(#aOrg)" class="flow"/>
    <text x="1131" y="434" text-anchor="middle" class="edge" fill="#ff5b35">chat JSON</text>

    <!-- legend -->
    <g transform="translate(408,802)">
      <line x1="0" y1="0" x2="32" y2="0" stroke="#3f3f46" stroke-width="1.9" marker-end="url(#aInk)"/>
      <text x="42" y="4" class="edge">request</text>
      <line x1="150" y1="0" x2="182" y2="0" stroke="#6c63ff" stroke-width="1.9" stroke-dasharray="6 6" marker-end="url(#aRen)"/>
      <text x="192" y="4" class="edge">SSE / dispatch</text>
      <line x1="340" y1="0" x2="372" y2="0" stroke="#ff5b35" stroke-width="1.9" stroke-dasharray="6 5" marker-end="url(#aOrg)"/>
      <text x="382" y="4" class="edge">inference call</text>
    </g>
  </svg>
</div>
</body>
</html>
