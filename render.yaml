previews:
  generation: automatic

services:
  - type: web
    name: read-it-for-me
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/server/index.js
    healthCheckPath: /health
    envVars:
      - key: RENDER_API_KEY
        displayName: Render API Key
        description: Required to trigger Render Workflow tasks
        required: true
        sync: false
      - key: WORKFLOW_SLUG
        value: read-it-for-me-workflow
        description: Slug of the linked Workflow service
      - key: GITHUB_REPO_URL
        value: https://github.com/ojusave/read-it-for-me
      - key: DATABASE_URL
        fromDatabase:
          name: read-it-for-me-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: read-it-for-me-db
    plan: free
    postgresMajorVersion: "16"
